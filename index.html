<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swaply | Trueque Comunitario</title>
    <style>
        :root {
            --deep-brown: #1a120b;
            --accent-blue: #00d2ff;
            --soft-brown: #3d2b1f;
            --card-bg: #ffffff;
            --text-gray: #666;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f5f2;
            overflow-x: hidden;
        }

        /* --- 1. SPLASH SCREEN --- */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #3d2b1f 0%, #1a120b 100%);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease;
        }

        /* --- 2. PANTALLA DE ACCESO --- */
        #login-screen {
            display: none;
            height: 100vh;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 350px;
            text-align: center;
            animation: slideUp 0.5s ease-out;
        }

        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-size: 0.8rem; margin-bottom: 5px; color: var(--text-gray); }
        .input-group input, .input-group select, .input-group textarea {
            width: 100%; padding: 12px;
            border: 1px solid #ddd; border-radius: 8px;
            box-sizing: border-box; outline: none;
        }

        .btn-login {
            width: 100%; padding: 12px;
            background-color: var(--accent-blue);
            border: none; border-radius: 8px;
            color: var(--deep-brown); font-weight: bold;
            cursor: pointer; transition: 0.3s;
            margin-top: 10px;
        }

        .btn-login:hover { transform: scale(1.02); filter: brightness(1.1); }

        /* --- 3. INTERFAZ PRINCIPAL --- */
        #main-content { display: none; opacity: 0; transition: opacity 1s ease; }
        
        header { 
            background-color: var(--deep-brown); 
            padding: 1rem 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { color: var(--accent-blue); font-weight: 800; font-size: 1.5rem; text-decoration: none; }
        .logo span { color: white; }

        .hero { background: var(--soft-brown); color: white; padding: 40px 20px; text-align: center; }

        /* --- GALERÍA --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: 0.3s;
            border: 1px solid #eee;
            animation: slideUp 0.4s ease-out;
        }

        .card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .card-img { width: 100%; height: 150px; object-fit: cover; background: #eee; }
        .card-content { padding: 15px; }
        .card-tag { font-size: 0.65rem; background: var(--accent-blue); padding: 3px 8px; border-radius: 5px; font-weight: bold; }
        .card-title { margin: 10px 0 5px 0; font-weight: bold; }

        /* --- BOTÓN FLOTANTE --- */
        .fab {
            position: fixed; bottom: 30px; right: 30px;
            width: 60px; height: 60px;
            background: var(--accent-blue);
            color: var(--deep-brown);
            border: none; border-radius: 50%;
            font-size: 30px; font-weight: bold;
            cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 999; display: none; justify-content: center; align-items: center;
        }

        /* --- MODAL --- */
        #publish-modal {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 10000; justify-content: center; align-items: center;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
