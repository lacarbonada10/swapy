<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swaply | Bienvenido</title>
    <style>
        /* Estilos base con un toque premium */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Degradado sutil para dar profundidad al marrón */
            background: radial-gradient(circle, #3d2b1f 0%, #1a120b 100%);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        .splash-container {
            text-align: center;
            animation: fadeIn 1.2s ease-out;
        }

        /* Tipografía moderna y con "glow" azul */
        .brand-name {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            color: #00d2ff; /* Azul vibrante */
            margin: 0;
            text-transform: lowercase; /* Estilo startup moderna */
            text-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
        }

        .brand-name span {
            color: #ffffff;
            opacity: 0.9;
        }

        /* Indicador de carga minimalista */
        .loading-bar-container {
            width: 180px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin: 25px auto;
            position: relative;
            overflow: hidden;
        }

        .loading-bar-progress {
            width: 40%;
            height: 100%;
            background: #00d2ff;
            border-radius: 10px;
            position: absolute;
            animation: shift 1.5s infinite ease-in-out;
        }

        .tagline {
            color: #a68d7a; /* Marrón claro/arena para contraste suave */
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 10px;
            font-weight: 500;
        }

        /* Animaciones */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes shift {
            0% { left: -40%; }
            50% { left: 100%; }
            100% { left: -40%; }
        }

    </style>
</head>
<body>

    <div class="splash-container">
        <h1 class="brand-name">swap<span>ly</span></h1>
        
        <div class="loading-bar-container">
            <div class="loading-bar-progress"></div>
        </div>

        <p class="tagline">Intercambia tu mundo</p>
    </div>

</body>
</html>
