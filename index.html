<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swaply - Cargando...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #8B4513; /* Fondo marrón */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .splash-content {
            text-align: center;
        }

        .splash-title {
            font-family: 'Montserrat', sans-serif; /* O la fuente de tu preferencia */
            font-size: 64px;
            color: #0000FF; /* Letras azules */
            margin-bottom: 20px;
        }

        .splash-logo {
            width: 150px;
            height: 150px;
            margin-bottom: 30px;
        }

        /* Agrega un spinner de carga si lo deseas */
        .loader {
            border: 16px solid #f3f3f3; /* Gris claro */
            border-top: 16px solid #3498db; /* Azul */
            border-radius: 50%;
            width: 120px;
            height: 120px;
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="splash-content">
        <h1 class="splash-title">Swaply</h1>
        <img src="logo.png" alt="Logo de Swaply" class="splash-logo"> <div class="loader"></div>
    </div>
</body>
</html>
